<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert consulting in neuroscience</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div id="header-placeholder"></div>

    <main>
        
      <section class="hero">
          <h2>Services</h2>
          <div class="hero-content">
            <div class="hero-text">
              <p>We provide high quality support and consulting services to help you make the most of complex data.</p>
              <p>Experience in spike trains, calcium imaging, natural behavior, computational modeling, and more.</p>
              <p>Need help with some data?<br />Write to us today at info@neurotaxis.org.</p>
            </div>
          </div>
      </section>
        
        
    </main>

    <div id="footer-placeholder"></div>

  <script>
    // Simple header/footer inclusion
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.getElementById('header-placeholder').innerHTML = data);

    fetch('footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);

    // Hamburger menu toggle
    document.addEventListener('click', function(e){
      if(e.target.closest('.hamburger')){
        document.querySelector('.menu').classList.toggle('open');
      }
    });
  </script>
  </div>
</body>
</html>
